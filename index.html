<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>صغار الصحابة — Little Companions</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0A0F24">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="صغار الصحابة">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --night: #0A0F24;
  --night-card: #141B3A;
  --gold: #D4AF37;
  --gold-light: #E8C158;
  --cream: #FBF4E4;
  --ink: #1A0E06;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; height: 100%; background: var(--night); font-family: 'Cairo', sans-serif; overflow: hidden; }
#app { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--night); }

/* top bar */
#topbar {
  position: relative; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: calc(10px + var(--safe-top)) 16px 8px;
  flex-shrink: 0;
}
#series-label {
  color: var(--gold-light);
  font-size: 13px; font-weight: 700;
  text-align: center; line-height: 1.3;
}
#series-label .en { display: block; font-family: 'Lora', serif; font-size: 11px; font-style: italic; opacity: .85; }

/* home screen */
#home-screen { flex: 1; min-height: 0; overflow-y: auto; padding: 8px 12px calc(20px + var(--safe-bottom)); }
.home-header { text-align: center; padding: 10px 16px 4px; }
.home-title { font-weight: 800; color: #fff; font-size: clamp(20px, 5vw, 28px); line-height: 1.3; }
.home-title .en { display: block; font-family: 'Lora', serif; font-style: italic; font-weight: 400; color: var(--gold-light); font-size: clamp(13px, 3.2vw, 17px); margin-top: 2px; }
.home-subtitle { color: var(--cream); font-size: clamp(13px, 3.2vw, 15px); margin: 4px 0 8px; opacity: .8; }

/* cards */
.cards-grid { display: flex; flex-direction: column; gap: 12px; max-width: 520px; margin: 0 auto; padding: 4px 0; }

.character-card {
  display: flex; align-items: center; gap: 14px;
  border: 1.5px solid rgba(212,175,55,.25);
  border-radius: 20px; padding: 12px 14px;
  cursor: pointer;
  transition: transform .2s, border-color .2s, box-shadow .25s;
  box-shadow: 0 4px 14px rgba(0,0,0,.25);
  position: relative; overflow: hidden;
  background: var(--night-card);
}
.character-card:active { transform: scale(0.97); }
.character-card:hover { border-color: var(--gold); box-shadow: 0 8px 28px rgba(212,175,55,.18); }

.card-badge {
  position: absolute; top: 8px; left: 8px;
  width: 26px; height: 26px; border-radius: 999px;
  background: var(--gold); color: var(--ink);
  font-weight: 800; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  z-index: 2; box-shadow: 0 2px 6px rgba(0,0,0,.3);
}

.card-icon-wrap {
  flex-shrink: 0; width: 68px; height: 68px;
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; position: relative; z-index: 1;
  box-shadow: 0 4px 12px rgba(0,0,0,.2);
}
.card-info { flex: 1; min-width: 0; position: relative; z-index: 1; }
.card-name { color: #fff; font-weight: 800; font-size: clamp(16px, 4.2vw, 20px); line-height: 1.2; }
.card-name .en { display: block; font-family: 'Lora', serif; font-style: italic; font-weight: 400; color: var(--gold-light); font-size: clamp(12px, 3vw, 14px); margin-top: 1px; }
.card-meta { display: flex; flex-wrap: wrap; gap: 4px 8px; margin-top: 4px; }
.card-tag { display: inline-flex; align-items: center; gap: 3px; color: var(--cream); font-size: clamp(10.5px, 2.4vw, 12px); opacity: .7; background: rgba(255,255,255,.05); padding: 1px 8px; border-radius: 999px; }
.card-tag span { font-family: 'Lora', serif; font-style: italic; }
.card-arrow { flex-shrink: 0; color: var(--gold); font-size: 18px; opacity: .4; position: relative; z-index: 1; }
.card-coming { display: inline-block; background: rgba(212,175,55,.12); border: 1px solid var(--gold); color: var(--gold-light); font-size: 11px; padding: 1px 10px; border-radius: 999px; font-weight: 700; }

/* coming soon overlay */
#coming-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 100;
  background: rgba(10,15,36,.95);
  flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 24px;
}
#coming-overlay.active { display: flex; }
#coming-overlay .icon { font-size: clamp(64px, 18vw, 100px); margin-bottom: 12px; }
#coming-overlay .msg { color: #fff; font-weight: 800; font-size: clamp(22px, 6vw, 32px); text-align: center; }
#coming-overlay .msg-en { font-family: 'Lora', serif; font-style: italic; color: var(--gold-light); font-size: clamp(14px, 3.6vw, 18px); margin-top: 6px; }
#coming-overlay .close-btn {
  margin-top: 30px;
  background: var(--gold); color: var(--ink);
  border: none; border-radius: 999px;
  padding: 12px 32px; font-family: 'Cairo', sans-serif;
  font-weight: 800; font-size: 15px; cursor: pointer;
}

/* scrollbar */
#home-screen::-webkit-scrollbar { width: 3px; }
#home-screen::-webkit-scrollbar-track { background: transparent; }
#home-screen::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 999px; }

@media (min-width: 600px) {
  .cards-grid { flex-direction: row; flex-wrap: wrap; }
  .character-card { flex: 1 1 calc(50% - 6px); min-width: 0; }
  #home-screen { padding: 16px 24px 24px; }
}
</style>
</head>
<body>
<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <div style="width:40px"></div>
    <div id="series-label">
      <span>صغار الصحابة</span>
      <span class="en">Little Companions</span>
    </div>
    <div style="width:40px"></div>
  </div>

  <!-- HOME SCREEN -->
  <div id="home-screen">
    <div class="home-header">
      <div class="home-title">
        صغار الصحابة
        <span class="en">Little Companions</span>
      </div>
      <div class="home-subtitle">قصص مشوقة من حياة أصحاب النبي ﷺ الصغار</div>
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>
</div>

<!-- COMING SOON OVERLAY -->
<div id="coming-overlay">
  <div class="icon">🏗️</div>
  <div class="msg">قريباً<br><span class="msg-en">Coming Soon</span></div>
  <button class="close-btn" onclick="closeComing()">رجوع</button>
</div>

<script>
// ================================================================
// صغار الصحابة — Main Menu
// ================================================================

// Story 1 links to the external page (which handles its own design & TTS).
// Other stories will be added later.
const STORIES = [
  { id: 'muadh-muawwidh', icon: '⚔', title: 'معاذ ومعوذ', titleEn: "Mu'adh & Mu'awwidh", age: 'غزوة بدر', themeEn: 'Badr', url: './story1.html' },
  { id: 'story2', icon: '🏹', title: 'أسامة بن زيد', titleEn: "Usama ibn Zayd", age: 'أمير الشبان', themeEn: 'Commander', url: './story2.html' },
  { id: 'umayr', icon: '🤲', title: 'عمير بن أبي وقاص', titleEn: 'Umayr ibn Abi Waqqas', age: 'غزوة بدر', themeEn: 'Tears for Jihad', url: './story3.html' },
  { id: 'rafi-samura', icon: '💪', title: 'رافع وسمرة', titleEn: "Rafi' & Samura", age: 'غزوة أحد', themeEn: 'Wrestling', url: './story4.html' },
  { id: 'zayd', icon: '✍', title: 'زيد بن ثابت', titleEn: 'Zayd ibn Thabit', age: 'كاتب الوحي', themeEn: 'Quran Compiler', url: './story5.html' },
  { id: 'ibn-umar', icon: '🌙', title: 'عبد الله بن عمر', titleEn: 'Abdullah ibn Umar', age: '13-15 سنة', themeEn: 'Night Prayer', url: './story6.html' },
  { id: 'ibn-abbas', icon: '📖', title: 'عبد الله بن عباس', titleEn: 'Abdullah ibn Abbas', age: '10-13 سنة', themeEn: 'Quran Scholar', url: './story7.html' },
];

const CARD_BG = ['#1A2A1A','#1A1A2A','#2A1A1A','#1A2A2A','#2A2A1A','#1A1A3A','#2A1A2A'];

const homeScreen = document.getElementById('home-screen');
const cardsGrid = document.getElementById('cards-grid');
const comingOverlay = document.getElementById('coming-overlay');

function renderCards() {
  cardsGrid.innerHTML = '';
  STORIES.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'character-card';
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.onclick = () => openCard(i);
    card.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openCard(i); }};
    card.innerHTML = `
      <div class="card-badge">${i + 1}</div>
      <div class="card-icon-wrap" style="background:${CARD_BG[i]}">${s.icon}</div>
      <div class="card-info">
        <div class="card-name">${s.title}<span class="en">${s.titleEn}</span></div>
        <div class="card-meta">
          <span class="card-tag">${s.age}</span>
          <span class="card-tag">✦ <span>${s.themeEn}</span></span>
        </div>
      </div>
      <div class="card-arrow">◀</div>
    `;
    cardsGrid.appendChild(card);
  });
}

function openCard(idx) {
  const s = STORIES[idx];
  if (s.url) {
    window.location.href = s.url;
  } else {
    comingOverlay.classList.add('active');
  }
}

function closeComing() {
  comingOverlay.classList.remove('active');
}

// PWA
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

renderCards();
</script>
</body>
</html>
