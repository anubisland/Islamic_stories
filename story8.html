<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>أنس بن مالك — صغار الصحابة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,600;1,400&family=Aref+Ruqaa:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none; }
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(180deg, #0D1B3E 0%, #1A2A4A 40%, #C49A3C 100%); font-family: 'Cairo', sans-serif; }
    #stars-canvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .moon { position: fixed; top: 24px; left: 24px; z-index: 1; pointer-events: none; font-size: 40px; opacity: 0.7; animation: moonGlow 4s ease-in-out infinite alternate; }
    @keyframes moonGlow { 0% { opacity: 0.5; transform: scale(1); } 100% { opacity: 0.9; transform: scale(1.05); } }
    .app-wrap { position: relative; z-index: 2; width: 100%; max-width: 720px; height: 100vh; height: 100dvh; display: flex; flex-direction: column; padding: 0 14px 12px; }
    .top-bar { display: flex; align-items: center; gap: 6px; padding: 10px 2px 4px; flex-shrink: 0; }
    .top-bar .back-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; color: #FFE4A0; transition: background 0.2s; user-select: none; -webkit-tap-highlight-color: transparent; flex-shrink: 0; touch-action: manipulation; }
    .top-bar .back-btn:hover { background: rgba(255,255,255,0.18); }
    .top-bar .back-btn:active { transform: scale(0.9); }
    .top-bar .series-badge { font-family: 'Cairo', sans-serif; font-size: 11px; font-weight: 700; color: #FFE4A0; white-space: nowrap; margin-left: auto; }
    .top-bar .counter-chip { font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 700; color: #FFE4A0; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 1px 10px; white-space: nowrap; }
    .top-bar .tts-chip { font-size: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 1px 8px; cursor: pointer; user-select: none; white-space: nowrap; color: #FFE4A0; -webkit-tap-highlight-color: transparent; transition: border-color 0.2s; touch-action: manipulation; }
    .top-bar .tts-chip:hover { border-color: #FFD700; }
    .top-bar .tts-chip.speaking { animation: chipPulse 0.8s ease-in-out infinite alternate; }
    @keyframes chipPulse { 0% { border-color: rgba(255,215,0,0.3); } 100% { border-color: #FFD700; box-shadow: 0 0 8px rgba(255,215,0,0.3); } }
    .top-bar .lang-chip { font-size: 12px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 1px 8px; cursor: pointer; user-select: none; white-space: nowrap; color: #FFE4A0; -webkit-tap-highlight-color: transparent; transition: border-color 0.2s; touch-action: manipulation; }
    .top-bar .lang-chip:hover { border-color: #FFD700; }
    .app-wrap.lang-en .text-ar { display: none; }
    .app-wrap.lang-ar .text-en { display: none; }
    #stage { position: relative; flex: 1; min-height: 0; overflow: hidden; }
    .slide { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity 0.4s ease; overflow: hidden; }
    .slide.active { opacity: 1; pointer-events: auto; z-index: 5; }
    .img-card { flex-shrink: 0; position: relative; width: 100%; aspect-ratio: 8 / 2.2; border-radius: 18px 18px 0 0; background: linear-gradient(135deg, #1A2A4A 0%, #2D1B0E 50%, #1A2A4A 100%); border: 1px solid rgba(255,215,0,0.25); border-bottom: none; display: flex; align-items: center; justify-content: center; gap: 8px; overflow: hidden; }
    .img-card svg { width: 105%; height: 105%; display: block; }
    .img-card .scene-num { position: absolute; top: 8px; right: 8px; background: #FFD700; color: #2D1B0E; font-family: 'Cairo', sans-serif; font-size: 11px; font-weight: 800; border-radius: 8px; padding: 1px 8px; direction: ltr; z-index: 2; }
    .night-wrap { flex: 1; min-height: 0; width: 100%; border-radius: 18px; background: linear-gradient(135deg, rgba(26,42,74,0.85) 0%, rgba(45,27,14,0.75) 100%); border: 1px solid rgba(255,215,0,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: clamp(16px, 3vw, 32px); text-align: center; overflow-y: auto; }
    .caption-card { width: 100%; flex: 1; min-height: 0; background: #FFF8E7; border: 1px solid #FFD700; border-top: 3px solid #FFD700; border-radius: 0 0 18px 18px; padding: clamp(10px, 2.5vw, 22px) clamp(12px, 3vw, 24px); text-align: center; overflow-y: auto; display: flex; flex-direction: column; }
    .caption-card .caption-inner { margin: auto; width: 100%; }
    .caption-card .text-ar { font-family: 'Cairo', sans-serif; font-weight: 700; font-size: clamp(17px, 3.5vw, 26px); line-height: 1.5; color: #1A0E06; margin-bottom: 8px; }
    .caption-card .divider { width: 50px; height: 2px; background: linear-gradient(90deg, transparent, #FFD700, transparent); margin: 4px auto 8px; flex-shrink: 0; }
    .caption-card .text-en { font-family: 'Lora', serif; font-size: clamp(13px, 2.2vw, 17px); line-height: 1.5; color: #3B2A1A; font-style: italic; font-weight: 400; }
    .cover-icon { font-size: clamp(52px, 12vw, 80px); margin-bottom: 6px; filter: drop-shadow(0 4px 20px rgba(255,215,0,0.3)); }
    .cover-ar-title { font-family: 'Aref Ruqaa', serif; font-weight: 700; font-size: clamp(32px, 7vw, 50px); color: #FFE4A0; text-shadow: 0 0 20px rgba(255,215,0,0.3); margin-bottom: 2px; }
    .cover-ar-sub { font-family: 'Cairo', sans-serif; font-weight: 600; font-size: clamp(16px, 3vw, 22px); color: #FFD700; }
    .cover-en-title { font-family: 'Lora', serif; font-size: clamp(14px, 2.6vw, 18px); color: rgba(255,228,160,0.7); font-style: italic; margin: 4px 0 8px; }
    .cover-badge { display: inline-block; font-family: 'Cairo', sans-serif; font-size: clamp(11px, 1.8vw, 14px); font-weight: 700; color: #FFE4A0; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,215,0,0.3); border-radius: 40px; padding: 3px 16px; }
    .moral-title { font-family: 'Cairo', sans-serif; font-weight: 700; font-size: clamp(18px, 3.6vw, 28px); color: #FFE4A0; margin-bottom: 10px; }
    .moral-item { display: flex; align-items: center; gap: 8px; background: rgba(255,248,231,0.06); border: 1px solid rgba(255,215,0,0.15); border-radius: 12px; padding: 8px 14px; margin-bottom: 6px; text-align: right; width: 100%; }
    .moral-num { font-family: 'Cairo', sans-serif; font-weight: 800; font-size: 14px; color: #FFD700; flex-shrink: 0; width: 24px; text-align: center; }
    .moral-text { flex: 1; }
    .moral-text .text-ar { font-family: 'Cairo', sans-serif; font-weight: 700; font-size: clamp(15px, 2.8vw, 20px); color: #FFF8E7; line-height: 1.5; }
    .moral-text .text-en { font-family: 'Lora', serif; font-size: clamp(12px, 2vw, 15px); color: rgba(255,228,160,0.6); font-style: italic; line-height: 1.5; }
    .closing-icon { font-size: clamp(44px, 10vw, 64px); margin-bottom: 4px; }
    .closing-ar { font-family: 'Aref Ruqaa', serif; font-weight: 700; font-size: clamp(26px, 5vw, 36px); color: #FFE4A0; }
    .closing-en { font-family: 'Lora', serif; font-size: clamp(14px, 2.6vw, 18px); color: rgba(255,228,160,0.6); font-style: italic; margin-top: 4px; }
    .home-btn { display: inline-block; margin-top: 12px; background: rgba(255,215,0,0.12); border: 1px solid #FFD700; border-radius: 30px; padding: 6px 22px; cursor: pointer; font-family: 'Cairo', sans-serif; font-weight: 700; font-size: clamp(13px, 2vw, 16px); color: #FFE4A0; transition: background 0.2s; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; text-decoration: none; }
    .home-btn:hover { background: rgba(255,215,0,0.25); }
    .home-btn:active { transform: scale(0.95); }
    .source-line { font-family: 'Cairo', sans-serif; font-size: clamp(10px, 1.5vw, 13px); color: rgba(255,228,160,0.4); margin-top: 10px; }
    .progress-bar { display: flex; align-items: center; justify-content: center; gap: 5px; padding: 6px 0 2px; flex-shrink: 0; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,215,0,0.2); transition: background 0.3s, transform 0.3s; }
    .dot.active { background: #FFD700; transform: scale(1.4); box-shadow: 0 0 8px rgba(255,215,0,0.3); }
    .dot.done { background: rgba(255,215,0,0.5); }
    .controls { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 4px 0 2px; flex-shrink: 0; }
    .ctrl-btn { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; color: #FFE4A0; transition: background 0.2s, transform 0.1s; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    .ctrl-btn:active { transform: scale(0.9); }
    .ctrl-btn:hover { background: rgba(255,255,255,0.15); }
    .ctrl-btn:disabled { opacity: 0.2; pointer-events: none; }
    .ctrl-btn.speak-btn { width: 32px; height: 32px; font-size: 14px; }
    @media (max-width: 480px) { .app-wrap { padding: 0 8px 8px; } .controls { gap: 10px; } .ctrl-btn { width: 34px; height: 34px; font-size: 15px; } .top-bar { padding: 6px 2px 2px; } .img-card { aspect-ratio: 8 / 2; } }
    @media (max-height: 650px) { .img-card { aspect-ratio: 8 / 1.8; } .caption-card { padding: 8px 12px; } .night-wrap { padding: 12px 14px; } .top-bar { padding: 4px 2px 2px; } .controls { padding: 0; gap: 8px; } .ctrl-btn { width: 30px; height: 30px; font-size: 13px; } .progress-bar { padding: 2px 0; } .caption-card .text-ar { font-size: clamp(15px, 3vw, 20px); } }
    @media (max-width: 360px) { .top-bar .series-badge { font-size: 10px; } .top-bar .tts-chip { font-size: 11px; } .top-bar .counter-chip { font-size: 11px; padding: 1px 6px; } }
    .loading-msg { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0D1B3E; color: #FFD700; font-size: 20px; z-index: 99; font-family: 'Cairo', sans-serif; }
    .loading-msg.hidden { display: none; }
  </style>
</head>
<body>
  <div class="loading-msg" id="loadingMsg">جاري التحميل…</div>
  <canvas id="stars-canvas"></canvas>
  <div class="moon" aria-hidden="true">🌙</div>
  <div class="app-wrap" id="appWrap">
    <div class="top-bar">
      <button class="back-btn" id="backBtn" aria-label="العودة إلى القصص" title="العودة إلى القصص">→</button>
      <span class="series-badge">🤲 صغار الصحابة</span>
      <span class="counter-chip" id="counterChip">١ / ١١</span>
      <span class="tts-chip" id="ttsChip" role="button" tabindex="0">⏳ صوت</span>
      <span class="lang-chip" id="langChip" role="button" tabindex="0">🇸🇦 عربي</span>
    </div>
    <div id="stage"></div>
    <div class="progress-bar" id="progressBar"></div>
    <div class="controls">
      <button class="ctrl-btn" id="prevBtn" aria-label="السابق">◀</button>
      <button class="ctrl-btn" id="playBtn" aria-label="تشغيل / إيقاف">▶</button>
      <button class="ctrl-btn speak-btn" id="speakBtn" aria-label="استماع">🔊</button>
      <button class="ctrl-btn" id="nextBtn" aria-label="التالي">▶</button>
    </div>
  </div>
  <script>
(function(){'use strict';var D='<defs><linearGradient id="skySunset" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0D1B3E"/><stop offset="45%" stop-color="#2D1B0E"/><stop offset="100%" stop-color="#C49A3C"/></linearGradient><linearGradient id="skyNight" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0A0F24"/><stop offset="100%" stop-color="#1A2A4A"/></linearGradient><linearGradient id="skyFire" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3D0C0C"/><stop offset="60%" stop-color="#8B2500"/><stop offset="100%" stop-color="#D4601A"/></linearGradient><radialGradient id="sunGlow"><stop offset="0%" stop-color="#FFD700" stop-opacity="0.3"/><stop offset="100%" stop-color="#FFD700" stop-opacity="0"/></radialGradient><radialGradient id="fireGlow"><stop offset="0%" stop-color="#FF8C00" stop-opacity="0.4"/><stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/></radialGradient><radialGradient id="lampGlow"><stop offset="0%" stop-color="#FFD700" stop-opacity="0.15"/><stop offset="100%" stop-color="#FFD700" stop-opacity="0"/></radialGradient><linearGradient id="tentGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#7A4E2D"/><stop offset="100%" stop-color="#5C3A1E"/></linearGradient></defs>';function svg(i){return'<svg viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">'+D+i+'</svg>'}
function st(){var s='',p=[[50,18],[90,30],[140,12],[180,25],[220,15],[270,28],[310,10],[350,22],[380,32],[30,40],[110,8],[160,35],[200,20],[250,35],[300,18],[340,35],[370,15]];for(var i=0;i<p.length;i++)s+='<circle cx="'+p[i][0]+'" cy="'+p[i][1]+'" r="'+(0.8+i%3*0.3)+'" fill="#FFF" opacity="'+(0.3+i%5*0.12)+'"/>';return s}
function mn(cx,cy,r){return'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#FFE4A0" opacity="0.85"/><circle cx="'+(cx+r*0.3)+'" cy="'+(cy-r*0.2)+'" r="'+(r*0.85)+'" fill="#0D1B3E"/>'}
function sn(cx,cy,r){return'<circle cx="'+cx+'" cy="'+cy+'" r="'+(r*1.6)+'" fill="url(#sunGlow)"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#FFD700" opacity="0.9"/>'}
function pl(x,gy,sc){sc=sc||1;var th=38*sc,fs=22*sc,by=gy,ty=by-th;return'<path d="M'+(x-2*sc)+','+by+' Q'+(x-sc)+','+(ty+th*0.3)+' '+x+','+ty+' Q'+(x+sc)+','+(ty+th*0.3)+' '+(x+2*sc)+','+by+'" fill="#5C3A1E" stroke="#4A2A0A" stroke-width="'+(0.5*sc)+'"/><path d="M'+x+','+ty+' Q'+(x-fs*1.4)+','+(ty-fs*0.3)+' '+(x-fs*1.6)+','+(ty+fs*0.4)+' Q'+(x-fs*0.5)+','+(ty+fs*0.1)+' '+x+','+ty+'" fill="#2D5A27"/><path d="M'+x+','+ty+' Q'+(x+fs*1.4)+','+(ty-fs*0.3)+' '+(x+fs*1.6)+','+(ty+fs*0.4)+' Q'+(x+fs*0.5)+','+(ty+fs*0.1)+' '+x+','+ty+'" fill="#3A7A33"/><path d="M'+x+','+ty+' Q'+(x-fs*0.8)+','+(ty-fs*0.7)+' '+(x-fs*0.2)+','+(ty-fs*0.9)+' Q'+(x+fs*0.3)+','+(ty-fs*0.5)+' '+x+','+ty+'" fill="#4A8A43"/><path d="M'+x+','+ty+' Q'+(x+fs*0.8)+','+(ty-fs*0.7)+' '+(x+fs*0.2)+','+(ty-fs*0.9)+' Q'+(x-fs*0.3)+','+(ty-fs*0.5)+' '+x+','+ty+'" fill="#3A7A33"/>'}
function du(){return'<path d="M0,65 Q60,52 120,62 Q180,48 240,58 Q300,50 360,55 L400,52 L400,110 L0,110 Z" fill="#A0782A" opacity="0.5"/><path d="M0,76 Q80,64 160,73 Q220,62 280,70 Q340,60 400,66 L400,110 L0,110 Z" fill="#8B6914" opacity="0.6"/><path d="M0,88 Q100,76 200,85 Q300,74 400,82 L400,110 L0,110 Z" fill="#C49A3C" opacity="0.4"/><path d="M0,97 Q80,88 160,94 Q260,84 340,92 L400,90 L400,110 L0,110 Z" fill="#D4AF37" opacity="0.25"/>'}
function tf(x,y,tc,hc,bc){bc=bc||'#8B6914';return'<path d="M'+(x-6)+','+(y-10)+' L'+(x-9)+','+(y+20)+' L'+(x+9)+','+(y+20)+' L'+(x+6)+','+(y-10)+' Z" fill="'+tc+'" stroke="#000" stroke-width="0.3" opacity="0.9"/><rect x="'+(x-3)+'" y="'+(y-12)+'" width="6" height="4" fill="'+hc+'" rx="1"/><circle cx="'+x+'" cy="'+(y-16)+'" r="5" fill="'+hc+'"/><path d="M'+(x-5)+','+(y-17)+' Q'+x+','+(y-24)+' '+(x+5)+','+(y-17)+'" fill="'+hc+'" opacity="0.8"/><rect x="'+(x-7)+'" y="'+(y-3)+'" width="14" height="2.5" fill="'+bc+'" rx="0.5" opacity="0.7"/>'}
window.sceneDesert=function(){return svg('<rect width="400" height="110" fill="url(#skySunset)"/>'+sn(330,38,16)+du()+pl(75,88,1)+pl(320,85,0.8))};
window.sceneNight=function(){return svg('<rect width="400" height="110" fill="url(#skyNight)"/>'+st()+mn(320,28,12)+'<path d="M0,75 Q100,65 200,72 Q300,62 400,68 L400,110 L0,110 Z" fill="#2D1B0E" opacity="0.8"/><path d="M130,80 L170,40 L210,80 Z" fill="url(#tentGrad)" stroke="#4A2A0A" stroke-width="0.5"/><path d="M130,80 L170,40 L170,80 Z" fill="#5C3A1E"/><path d="M148,80 L170,58 L192,80 Z" fill="#1A0E06"/><ellipse cx="240" cy="82" rx="10" ry="4" fill="#3D1C00"/><circle cx="240" cy="80" r="8" fill="url(#fireGlow)"/><path d="M236,80 Q240,68 244,80" fill="#FF8C00" opacity="0.9"/><path d="M238,80 Q240,72 242,80" fill="#FFD700" opacity="0.7"/><line x1="236" y1="82" x2="244" y2="82" stroke="#4A2A0A" stroke-width="2" stroke-linecap="round"/>'+pl(60,78,0.9)+pl(310,76,0.8))};

  <script>
    (function () {
      'use strict';

var SLIDES = [
  { type: 'cover', title: 'أَنَسُ بْنُ مَالِكٍ', titleEn: 'Anas ibn Malik', subtitle: 'خَادِمُ رَسُولِ اللَّهِ ﷺ — حَافِظُ السِّرِّ الْأَمِينِ', emojis: ['🤲','🌟'], source: 'صَحِيحُ مُسْلِمَ (كِتَابُ فَضَائِلِ الصَّحَابَةِ)' },
  { type: 'intro', emojis: ['📜'], lines: [
    { ar: 'نَسَبُهُ: أَنَسُ بْنُ مَالِكِ بْنِ النَّضْرِ الْأَنْصَارِيُّ الْخَزْرَجِيُّ، خَادِمُ رَسُولِ اللَّهِ ﷺ وَأَحَدُ أَكْثَرِ الصَّحَابَةِ رِوَايَةً لِلْحَدِيثِ.', en: 'Lineage: Anas ibn Malik al-Ansari al-Khazraji, servant of the Messenger of Allah ﷺ.' },
    { ar: 'عُمْرُهُ: نَحْوَ 10 سَنَوَاتٍ عِنْدَمَا جَاءَتْ بِهِ أُمُّهُ أُمُّ سُلَيْمٍ إِلَى النَّبِيِّ ﷺ لِيَخْدُمَهُ.', en: 'Age: About 10 years when his mother Umm Sulaym brought him to serve the Prophet ﷺ.' },
    { ar: 'فَضْلُهُ: خَدَمَ النَّبِيَّ ﷺ 10 سِنِينَ، وَدَعَا لَهُ بِالْبَرَكَةِ فِي الْمَالِ وَالْوَلَدِ وَطُولِ الْعُمْرِ.', en: 'Virtue: He served the Prophet for 10 years. The Prophet prayed for him to have blessings.' },
  ]},
  { type: 'scene', svg: 'city', ar: 'جَاءَتْ أُمُّ سُلَيْمٍ بِأَنَسٍ إِلَى النَّبِيِّ ﷺ وَعُمْرُهُ 10 سَنَوَاتٍ، وَقَالَتْ: يَا رَسُولَ اللَّهِ، هَذَا أَنَسٌ غُلَامٌ ذَكِيٌّ يَخْدُمُكَ. فَفَرِحَ بِهِ النَّبِيُّ ﷺ.', en: 'Umm Sulaym brought Anas to the Prophet at age 10, saying: "This smart boy will serve you." The Prophet welcomed him.' },
  { type: 'scene', svg: 'madinah', ar: 'كَانَ أَنَسٌ يَخْدُمُ النَّبِيَّ ﷺ بِإِخْلَاصٍ، وَكَانَ النَّبِيُّ ﷺ يُعَامِلُهُ بِرَحْمَةٍ وَحَنَانٍ وَيَقُولُ لَهُ: يَا بُنَيَّ.', en: 'Anas served the Prophet sincerely. The Prophet treated him with mercy and called him "O my son."' },
  { type: 'scene', svg: 'desert', ar: 'فِي يَوْمٍ مِنَ الْأَيَّامِ، أَرْسَلَ النَّبِيُّ ﷺ أَنَساً فِي حَاجَةٍ، فَانْطَلَقَ أَنَسٌ يَجْرِي بِكُلِّ حَمَاسٍ وَفَرَحٍ لِيُنَفِّذَ أَمْرَ النَّبِيِّ الْحَبِيبِ.', en: 'One day, the Prophet sent Anas on an errand. Anas ran eagerly to carry out the beloved Prophet\'s command.' },
  { type: 'scene', svg: 'tent', ar: 'تَأَخَّرَ أَنَسٌ فِي الْعَوْدَةِ إِلَى الْمَنْزِلِ، فَسَأَلَتْهُ أُمُّهُ أُمُّ سُلَيْمٍ: مَا الَّذِي حَبَسَكَ يَا بُنَيَّ؟ فَقَالَ بِأَدَبٍ: بَعَثَنِي رَسُولُ اللَّهِ ﷺ فِي حَاجَةٍ.', en: 'Anas returned home late. His mother Umm Sulaym asked: "What kept you, my son?" He said politely: "The Messenger of Allah sent me on an errand."' },
  { type: 'scene', svg: 'study', ar: 'سَأَلَتْهُ أُمُّهُ: وَمَا هِيَ الْحَاجَةُ؟ فَقَالَ أَنَسٌ بِثَبَاتٍ وَثِقَةٍ: إِنَّهُ سِرٌّ لِرَسُولِ اللَّهِ ﷺ! فَابْتَسَمَتْ أُمُّهُ وَقَالَتْ: لَا تُحَدِّثَنَّ بِسِرِّ رَسُولِ اللَّهِ أَحَداً.', en: 'His mother asked: "What was the errand?" Anas said firmly: "It is a secret of the Messenger of Allah!" His mother smiled: "Never tell anyone his secret."' },
  { type: 'scene', svg: 'scribe', ar: 'حَفِظَ أَنَسٌ السِّرَّ وَلَمْ يُخْبِرْ بِهِ أَحَداً طَوَالَ حَيَاتِهِ، فَكَانَ مِثَالاً رَائِعاً فِي الْأَمَانَةِ وَحِفْظِ الْأَسْرَارِ، وَنَالَ بِذَلِكَ مَحَبَّةَ النَّبِيِّ ﷺ وَثِقَتَهُ.', en: 'Anas kept the secret and never told anyone throughout his life, becoming a perfect example of trustworthiness.' },
  { type: 'morals', emojis: ['🌱'], items: [
    { ar: 'الْأَمَانَةُ وَحِفْظُ السِّرِّ مِنْ أَعْظَمِ صِفَاتِ الْمُؤْمِنِ الصَّادِقِ.', en: 'Trustworthiness and keeping secrets are among the greatest traits of a true believer.' },
    { ar: 'الطِّفْلُ الْأَمِينُ يَنَالُ ثِقَةَ الْكِبَارِ وَيَكُونُ قُدْوَةً لِأَقْرَانِهِ.', en: 'A trustworthy child earns the trust of adults and becomes a role model for peers.' },
    { ar: 'خِدْمَةُ النَّبِيِّ ﷺ وَطَاعَتُهُ تَجْلِبُ الْبَرَكَةَ فِي الْعُمُرِ وَالرِّزْقِ.', en: 'Serving and obeying the Prophet brings blessings in life and provision.' },
  ]},
  { type: 'closing', emojis: ['⭐'], ar: 'نَلْتَقِي فِي الْقِصَّةِ الْقَادِمَةِ', en: 'See you in the next story', source: 'صَحِيحُ مُسْلِمَ — سُنَنُ التِّرْمِذِيِّ' },
];

      var total = SLIDES.length;
      var stage = document.getElementById('stage');
      var loadingMsg = document.getElementById('loadingMsg');
      var counterChip = document.getElementById('counterChip');
      var progressBar = document.getElementById('progressBar');
      var prevBtn = document.getElementById('prevBtn');
      var nextBtn = document.getElementById('nextBtn');
      var playBtn = document.getElementById('playBtn');
      var speakBtn = document.getElementById('speakBtn');
      var ttsChip = document.getElementById('ttsChip');
      var langChip = document.getElementById('langChip');
      var backBtn = document.getElementById('backBtn');

      var current = 0, autoPlay = false, speaking = false, playGen = 0;
      var ttsAvail = false, arVoice = null, voiceDone = false;
      var appLang = 'ar';

      function arabicNum(n) {
        var d = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
        if (n === 0) return '٠';
        var s = '';
        while (n > 0) { s = d[n % 10] + s; n = Math.floor(n / 10); }
        return s;
      }

      function initTTS() {
        if (!('speechSynthesis' in window)) { ttsChip.textContent = '🔇 غير متوفر'; voiceDone = true; return; }
        ttsChip.textContent = '⏳ جاري...';
        loadVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined)
          window.speechSynthesis.onvoiceschanged = loadVoices;
        var pc = 0, pt = setInterval(function () {
          if (voiceDone || pc > 25) { clearInterval(pt); return; }
          loadVoices(); pc++;
        }, 200);
      }
      function loadVoices() {
        if (!('speechSynthesis' in window)) return;
        var v = window.speechSynthesis.getVoices();
        if (v.length > 0 && !voiceDone) {
          voiceDone = true; ttsAvail = true;
          arVoice = v.find(function (x) { return /^ar/i.test(x.lang); });
          ttsChip.textContent = arVoice ? '🔊 صوت عربي' : '🔉 ' + v.length + ' صوت';
          window.speechSynthesis.cancel();
        }
      }
      function stopSpeech() {
        if ('speechSynthesis' in window) window.speechSynthesis.cancel();
        speaking = false; ttsChip.classList.remove('speaking');
      }
      function sceneSvg(type) {
        switch (type) {
          case 'desert': return window.sceneDesert ? window.sceneDesert() : '';
          case 'night': return window.sceneNight ? window.sceneNight() : '';
          case 'battle': return window.sceneBattle ? window.sceneBattle() : '';
          case 'madinah': return window.sceneMadinah ? window.sceneMadinah() : '';
          case 'tent': return window.sceneTent ? window.sceneTent() : '';
          case 'study': return window.sceneStudy ? window.sceneStudy() : '';
          case 'prayer': return window.scenePrayer ? window.scenePrayer() : '';
          case 'wrestle': return window.sceneWrestle ? window.sceneWrestle() : '';
          case 'scribe': return window.sceneScribe ? window.sceneScribe() : '';
          case 'camel': return window.sceneCamel ? window.sceneCamel() : '';
          case 'oasis': return window.sceneOasis ? window.sceneOasis() : '';
          case 'city': return window.sceneCity ? window.sceneCity() : '';
          case 'army': return window.sceneArmy ? window.sceneArmy() : '';
          case 'target': return window.sceneTarget ? window.sceneTarget() : '';
          default: return '';
        }
      }

      function getNarration(i) {
        var s = SLIDES[i];
        if (s.type === 'cover') return s.title + '. ' + s.subtitle;
        if (s.type === 'intro') return s.lines.map(function (l) { return l.ar; }).join(' ');
        if (s.type === 'scene') return s.ar;
        if (s.type === 'morals') return s.items.map(function (m) { return m.ar; }).join(' ');
        if (s.type === 'closing') return 'نلتقي في القصة القادمة';
        return '';
      }

      function queueNarration(from) {
        if (!('speechSynthesis' in window)) return;
        stopSpeech();
        playGen++; var mg = playGen;
        if (!voiceDone) { var v = window.speechSynthesis.getVoices(); if (v.length > 0) { voiceDone = true; ttsAvail = true; arVoice = v.find(function (x) { return /^ar/i.test(x.lang); }); } }
        if (!ttsAvail) return;
        var av = arVoice;
        for (var i = from; i < total; i++) {
          var t = getNarration(i); if (!t) continue;
          var u = new SpeechSynthesisUtterance(t);
          u.lang = av ? av.lang : 'ar'; u.rate = 0.85; if (av) u.voice = av;
          u.onstart = (function (si) { return function () { if (mg !== playGen) return; speaking = true; ttsChip.classList.add('speaking'); if (current !== si) { current = si; show(current); } }; })(i);
          u.onerror = (function (si) { return function () { if (mg !== playGen) return; if (si === current) speaking = false; ttsChip.classList.remove('speaking'); }; })(i);
          if (i === total - 1) { u.onend = (function () { return function () { if (mg !== playGen) return; speaking = false; ttsChip.classList.remove('speaking'); autoPlay = false; updatePlayBtn(); }; })(); }
          try { window.speechSynthesis.speak(u); } catch (e) {}
        }
      }

      function renderSlide(i) {
        var s = SLIDES[i]; if (!s) return '';
        var h = '';

        function emojisHtml(arr) {
          return arr.map(function (e) { return '<span class="scene-emoji">' + e + '</span>'; }).join('');
        }

        if (s.type === 'cover') {
          h += '<div class="night-wrap"><div class="cover-icon">' + s.emojis[0] + '</div><div class="cover-ar-title">' + s.title + '</div><div class="cover-ar-sub">' + s.subtitle + '</div><div class="cover-en-title">' + s.titleEn + '</div><div class="cover-badge">صغار الصحابة</div>' + (s.source ? '<div class="source-line">' + s.source + '</div>' : '') + '</div>';
        } else if (s.type === 'intro') {
          h += '<div class="night-wrap"><div style="font-size:clamp(42px,10vw,64px);margin-bottom:6px">' + emojisHtml(s.emojis) + '</div>';
          for (var li = 0; li < s.lines.length; li++) {
            if (li > 0) h += '<div style="height:5px"></div>';
            h += '<div class="cover-ar-sub" style="font-size:clamp(17px,3.2vw,24px);color:#FFF8E7">' + s.lines[li].ar + '</div><div class="cover-en-title" style="font-size:clamp(13px,2.2vw,16px)">' + s.lines[li].en + '</div>';
          }
          if (s.source) h += '<div class="source-line">' + s.source + '</div>'; h += '</div>';
        } else if (s.type === 'scene') {
          h += '<div class="img-card">' + (s.svg ? sceneSvg(s.svg) : '<div style="font-size:clamp(32px,8vw,56px)">' + emojisHtml(s.emojis || ['🏜']) + '</div>') + '<div class="scene-num">' + arabicNum(i - 2) + '</div></div>';
          h += '<div class="caption-card"><div class="caption-inner"><div class="text-ar">' + s.ar + '</div><div class="divider"></div><div class="text-en">' + s.en + '</div></div></div>';
        } else if (s.type === 'morals') {
          h += '<div class="night-wrap"><div style="font-size:clamp(36px,8vw,50px);margin-bottom:4px">' + emojisHtml(s.emojis) + '</div><div class="moral-title">الدروس المستفادة</div>';
          for (var mi = 0; mi < s.items.length; mi++) {
            h += '<div class="moral-item"><div class="moral-num">' + arabicNum(mi + 1) + '</div><div class="moral-text"><div class="text-ar">' + s.items[mi].ar + '</div><div class="text-en">' + s.items[mi].en + '</div></div></div>';
          }
          if (s.source) h += '<div class="source-line">' + s.source + '</div>'; h += '</div>';
        } else if (s.type === 'closing') {
          h += '<div class="night-wrap"><div class="closing-icon">' + s.emojis[0] + '</div><div class="closing-ar">' + s.ar + '</div><div class="closing-en">' + s.en + '</div><a class="home-btn" href="./index.html">← العودة إلى القصص</a>' + (s.source ? '<div class="source-line">' + s.source + '</div>' : '') + '</div>';
        }
        return h;
      }

      function show(i) {
        var w = document.createElement('div'); w.className = 'slide'; w.innerHTML = renderSlide(i);
        stage.innerHTML = ''; stage.appendChild(w);
        requestAnimationFrame(function () { requestAnimationFrame(function () { w.classList.add('active'); }); });
        updateChrome(i);
      }
      function updateChrome(i) {
        counterChip.textContent = arabicNum(i + 1) + ' / ' + arabicNum(total);
        var dots = progressBar.children;
        for (var d = 0; d < dots.length; d++) { dots[d].className = 'dot'; if (d < i) dots[d].classList.add('done'); if (d === i) dots[d].classList.add('active'); }
        prevBtn.disabled = i === 0; nextBtn.disabled = i === total - 1;
      }
      function buildDots() {
        progressBar.innerHTML = '';
        for (var i = 0; i < total; i++) { var d = document.createElement('div'); d.className = 'dot'; progressBar.appendChild(d); }
      }

      function goHome() { stopSpeech(); window.location.href = './index.html'; }
      function goTo(i) {
        if (i < 0 || i >= total) return;
        current = i; show(current);
        if (autoPlay) { stopSpeech(); queueNarration(current); } else { stopSpeech(); }
        updatePlayBtn();
      }
      function prevSlide() { if (autoPlay) stopSpeech(); goTo(current - 1); }
      function nextSlide() { if (autoPlay) stopSpeech(); goTo(current + 1); }

      function togglePlay() {
        if (autoPlay) { autoPlay = false; speaking = false; stopSpeech(); updatePlayBtn(); }
        else {
          if (current === total - 1) goTo(0);
          autoPlay = true; updatePlayBtn(); queueNarration(current);
        }
      }
      function toggleLang() {
        appLang = appLang === 'ar' ? 'en' : 'ar';
        var wrap = document.getElementById('appWrap');
        wrap.classList.remove('lang-ar', 'lang-en');
        wrap.classList.add('lang-' + appLang);
        langChip.textContent = appLang === 'ar' ? '🇸🇦 عربي' : '🇬🇧 English';
      }

      function updatePlayBtn() {
        playBtn.textContent = autoPlay ? '⏸' : '▶';
        playBtn.setAttribute('aria-label', autoPlay ? 'إيقاف مؤقت' : 'تشغيل');
      }

      function initStars() {
        var c = document.getElementById('stars-canvas'), cx = c.getContext('2d');
        if (!cx) return function () {};
        var stars = [], W, H, dpr = window.devicePixelRatio || 1;
        function resize() { W = window.innerWidth; H = window.innerHeight; c.width = W * dpr; c.height = H * dpr; c.style.width = W + 'px'; c.style.height = H + 'px'; cx.scale(dpr, dpr); }
        window.addEventListener('resize', resize); resize();
        var cnt = Math.min(150, Math.floor((W * H) / 6000));
        for (var i = 0; i < cnt; i++) { stars.push({ x: Math.random() * W, y: Math.random() * H, r: Math.random() * 1.4 + 0.3, a: Math.random() * 0.5 + 0.3, s: Math.random() * 0.005 + 0.002 }); }
        var aid;
        function draw() {
          cx.clearRect(0, 0, W, H); var n = performance.now();
          for (var i = 0; i < stars.length; i++) { var st = stars[i]; var al = st.a * (0.5 + 0.5 * Math.sin(n * st.s + i)); cx.beginPath(); cx.arc(st.x, st.y, st.r, 0, Math.PI * 2); cx.fillStyle = 'rgba(255,228,160,' + al + ')'; cx.fill(); }
          aid = requestAnimationFrame(draw);
        }
        draw(); return function () { cancelAnimationFrame(aid); };
      }

      document.addEventListener('keydown', function (e) {
        if (e.key === 'ArrowRight') { e.preventDefault(); nextSlide(); }
        else if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
        else if (e.key === ' ' || e.key === 'Spacebar') { e.preventDefault(); togglePlay(); }
      });

      (function () {
        var sx = 0, sy = 0, el = document.getElementById('appWrap');
        el.addEventListener('touchstart', function (e) { var t = e.changedTouches[0]; sx = t.screenX; sy = t.screenY; }, { passive: true });
        el.addEventListener('touchend', function (e) { var t = e.changedTouches[0]; var dx = t.screenX - sx, dy = t.screenY - sy; if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 48) { if (dx < 0) nextSlide(); else prevSlide(); } }, { passive: true });
      })();

      function init() {
        buildDots(); show(0); loadingMsg.classList.add('hidden');
        initStars(); initTTS();
        document.getElementById('appWrap').classList.add('lang-ar');
        backBtn.addEventListener('click', goHome);
        prevBtn.addEventListener('click', prevSlide);
        nextBtn.addEventListener('click', nextSlide);
        playBtn.addEventListener('click', togglePlay);
        speakBtn.addEventListener('click', function () { stopSpeech(); queueNarration(current); });
        ttsChip.addEventListener('click', function () { stopSpeech(); queueNarration(current); });
        langChip.addEventListener('click', toggleLang);
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
    })();
  </script>
</body>
</html>
